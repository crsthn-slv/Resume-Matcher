<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Starting Resume Matcher</title>
    <style>
      :root {
        --canvas: #f0f0e8;
        --panel: #e5e5e0;
        --ink: #000000;
        --primary: #1d4ed8;
        --muted: #6b7280;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--canvas);
        color: var(--ink);
        font-family: 'Geist', 'Segoe UI', sans-serif;
        background-image:
          linear-gradient(rgba(29, 78, 216, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(29, 78, 216, 0.1) 1px, transparent 1px);
        background-size: 28px 28px;
      }

      main {
        width: min(82vw, 420px);
        text-align: center;
        padding: 28px 24px;
        border: 2px solid var(--ink);
        background: var(--canvas);
        box-shadow: 8px 8px 0 0 var(--ink);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 22px;
        border: 1px solid var(--ink);
        background: var(--panel);
        padding: 6px 10px;
        font-family: 'Geist Mono', 'SFMono-Regular', monospace;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        box-shadow: 2px 2px 0 0 var(--ink);
      }

      .spinner {
        width: 52px;
        height: 52px;
        margin: 0 auto 20px;
        border: 4px solid rgba(29, 78, 216, 0.15);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      h1 {
        margin: 0 0 10px;
        color: var(--primary);
        font-family: 'Geist Mono', 'SFMono-Regular', monospace;
        font-size: clamp(28px, 5vw, 38px);
        font-weight: 700;
        line-height: 0.95;
        letter-spacing: -0.04em;
        text-transform: uppercase;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .status {
        margin-top: 18px;
        border-top: 1px solid var(--ink);
        padding-top: 12px;
        font-family: 'Geist Mono', 'SFMono-Regular', monospace;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Desktop Shell</div>
      <div class="spinner" aria-hidden="true"></div>
      <h1>Starting Resume Matcher</h1>
      <p>Please wait while the local app runtime gets ready.</p>
      <div class="status">Preparing desktop workspace</div>
    </main>
  </body>
</html>
