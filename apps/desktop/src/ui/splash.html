<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Starting Resume Matcher</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f4f0e8, #dfe8f3);
        color: #132237;
        font-family: "Segoe UI", sans-serif;
      }
      main {
        text-align: center;
        padding: 32px;
      }
      .spinner {
        width: 48px;
        height: 48px;
        margin: 0 auto 20px;
        border: 4px solid rgba(19, 34, 55, 0.15);
        border-top-color: #132237;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      p {
        margin: 0;
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="spinner" aria-hidden="true"></div>
      <h1>Starting Resume Matcher</h1>
      <p>Please wait while the app gets ready.</p>
    </main>
  </body>
</html>
