<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume Matcher couldn't start</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fff6f2;
        color: #421c11;
        font-family: "Segoe UI", sans-serif;
      }
      main {
        max-width: 480px;
        padding: 32px;
        text-align: center;
      }
      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 24px;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
      }
      .primary {
        background: #421c11;
        color: #fff;
      }
      .secondary {
        background: #f0dcd3;
        color: #421c11;
      }
      #details {
        margin-top: 16px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Resume Matcher couldn't start</h1>
      <p>The app hit a startup problem. You can try again or open the logs for support.</p>
      <div class="actions">
        <button class="primary" id="retry">Try again</button>
        <button class="secondary" id="logs">Open logs</button>
      </div>
      <p id="details"></p>
    </main>
    <script>
      const details = document.getElementById('details');
      const retry = document.getElementById('retry');
      const logs = document.getElementById('logs');

      window.desktopShell?.onBootstrapState((state) => {
        if (state.stage === 'failed') {
          details.textContent = state.message;
        }
      });

      retry?.addEventListener('click', () => {
        void window.desktopShell?.retryBootstrap();
      });

      logs?.addEventListener('click', () => {
        void window.desktopShell?.openLogsDirectory();
      });
    </script>
  </body>
</html>
