<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume Matcher couldn't start</title>
    <style>
      :root {
        --canvas: #f0f0e8;
        --panel: #fff4ee;
        --panel-muted: #f4ddd3;
        --ink: #000000;
        --primary: #1d4ed8;
        --danger: #dc2626;
        --muted: #5b6678;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--canvas);
        color: var(--ink);
        font-family: 'Geist', 'Segoe UI', sans-serif;
        background-image:
          linear-gradient(rgba(29, 78, 216, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(29, 78, 216, 0.08) 1px, transparent 1px);
        background-size: 28px 28px;
      }

      main {
        max-width: 480px;
        padding: 28px 24px;
        text-align: left;
        border: 2px solid var(--ink);
        background: var(--panel);
        box-shadow: 8px 8px 0 0 var(--ink);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        margin-bottom: 18px;
        border: 1px solid var(--ink);
        background: #f6ddd8;
        padding: 6px 10px;
        font-family: 'Geist Mono', 'SFMono-Regular', monospace;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        box-shadow: 2px 2px 0 0 var(--ink);
      }

      h1 {
        margin: 0 0 12px;
        color: var(--danger);
        font-family: 'Geist Mono', 'SFMono-Regular', monospace;
        font-size: clamp(26px, 4.8vw, 34px);
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.04em;
        text-transform: uppercase;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      button {
        border: 1px solid var(--ink);
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
        font-family: 'Geist Mono', 'SFMono-Regular', monospace;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        box-shadow: 3px 3px 0 0 var(--ink);
        transition: transform 120ms ease;
      }

      button:hover {
        transform: translate(-1px, -1px);
      }

      .primary {
        background: var(--danger);
        color: #fff;
      }

      .secondary {
        background: var(--panel-muted);
        color: var(--ink);
      }

      #details {
        margin-top: 16px;
        min-height: 18px;
        border-top: 1px solid var(--ink);
        padding-top: 12px;
        font-family: 'Geist Mono', 'SFMono-Regular', monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Startup Failure</div>
      <h1>Resume Matcher couldn't start</h1>
      <p>The app hit a startup problem. You can try again or open the logs for support.</p>
      <div class="actions">
        <button class="primary" id="retry">Try again</button>
        <button class="secondary" id="logs">Open logs</button>
      </div>
      <p id="details"></p>
    </main>
    <script>
      const details = document.getElementById('details');
      const retry = document.getElementById('retry');
      const logs = document.getElementById('logs');

      window.desktopShell?.onBootstrapState((state) => {
        if (state.stage === 'failed') {
          details.textContent = state.message;
        }
      });

      retry?.addEventListener('click', () => {
        void window.desktopShell?.retryBootstrap();
      });

      logs?.addEventListener('click', () => {
        void window.desktopShell?.openLogsDirectory();
      });
    </script>
  </body>
</html>
